services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Joppnet\JnPhpcontentelement\:
    resource: '../Classes/*'
    exclude: '../Classes/Domain/Model/*'

  # Upgrade wizard for migration from list_type to CType (TYPO3 v13.4+)
  Joppnet\JnPhpcontentelement\Upgrades\PhpContentElementListTypeToCTypeUpdate:
    tags:
      - name: 'typo3.upgrade_wizard'
        identifier: 'jnphpcontentelement:listTypeToCType'
        title: 'Migrate PHP Content Element from list_type to CType'
        description: 'Migrates existing content elements from the deprecated list_type plugin to the new CType content element.'
